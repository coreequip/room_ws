<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomWS Demo</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        header {
            padding: 10px 20px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .room-selector {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .room-selector input {
            background: #2c2c2c;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            color: white;
            font-size: 0.9em;
            width: 150px;
        }
        .status {
            font-size: 0.8em;
            color: #888;
        }
        .status.connected { color: #4caf50; }
        
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        #sidebar {
            width: 200px;
            background: #1a1a1a;
            border-left: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
        }
        
        .member-item {
            padding: 8px 12px;
            margin-bottom: 4px;
            background: #2a2a2a;
            border-radius: 6px;
            font-size: 0.9em;
        }
        .member-item.me {
            border: 1px solid #007bff;
            color: #007bff;
        }

        .message {
            background: #2a2a2a;
            padding: 10px 16px;
            border-radius: 12px;
            max-width: 75%;
            align-self: flex-start;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .message.own {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }
        .message .meta {
            font-size: 0.7em;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        
        #input-area {
            padding: 20px;
            background: #1e1e1e;
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }
        #msgInput {
            flex: 1;
            background: #2c2c2c;
            border: 1px solid #444;
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        
        button {
            padding: 8px 16px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div style="font-weight: bold;">RoomWS</div>
            <div class="room-selector">
                <input type="text" id="roomInput" value="general" placeholder="Room name...">
                <button id="joinBtn">Join</button>
            </div>
        </div>
        <div id="status" class="status">Connecting...</div>
    </header>
    
    <main>
        <div id="chat-container">
            <div id="chat"></div>
            <form id="input-area">
                <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
        <div id="sidebar">
            <h4 style="margin-top:0">Members</h4>
            <div id="member-list"></div>
        </div>
    </main>

    <script src="roomws.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const chat = document.getElementById('chat');
        const form = document.getElementById('input-area');
        const msgInput = document.getElementById('msgInput');
        const roomInput = document.getElementById('roomInput');
        const joinBtn = document.getElementById('joinBtn');
        const memberList = document.getElementById('member-list');

        let currentRoom = null;
        let currentRoomName = null;

        // Initialize our client
        const drone = new RoomWS('demo-channel');
        
        drone.on('open', error => {
            if (error) {
                statusEl.textContent = 'Error: ' + error;
                return;
            }
            statusEl.textContent = 'Connected as ' + drone.clientId.substring(0, 4);
            statusEl.className = 'status connected';
            
            // Join default room
            switchRoom(roomInput.value);
        });

        drone.on('close', () => {
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'status';
        });

        function switchRoom(name) {
            if (!name) return;
            
            // Clear current UI
            chat.innerHTML = '';
            memberList.innerHTML = '';
            
            if (currentRoomName) {
                // If we had a previous room, we could unsubscribe here
                // For this simple demo, we just switch context
                addSystemMessage(`Leaving room: ${currentRoomName}`);
            }

            currentRoomName = name;
            currentRoom = drone.subscribe(name);
            
            currentRoom.on('open', () => {
                addSystemMessage(`Joined room: ${name}`);
            });
            
            currentRoom.on('message', (message, data) => {
                const isOwn = data.client_id === drone.clientId;
                addMessage(message, isOwn, data.client_id.substring(0, 4));
            });

            currentRoom.on('members', members => {
                updateMemberList(members);
            });

            currentRoom.on('join', memberId => {
                addSystemMessage(`User ${memberId.substring(0, 4)} joined`);
                updateMemberList(currentRoom.members);
            });

            currentRoom.on('leave', memberId => {
                addSystemMessage(`User ${memberId.substring(0, 4)} left`);
                updateMemberList(currentRoom.members);
            });
        }

        joinBtn.onclick = () => {
            const newRoom = roomInput.value.trim();
            if (newRoom && newRoom !== currentRoomName) {
                switchRoom(newRoom);
            }
        };

        roomInput.onkeypress = (e) => {
            if (e.key === 'Enter') joinBtn.click();
        };

        function updateMemberList(members) {
            memberList.innerHTML = '';
            members.forEach(memberId => {
                const div = document.createElement('div');
                div.className = 'member-item' + (memberId === drone.clientId ? ' me' : '');
                div.textContent = (memberId === drone.clientId ? 'You ' : 'User ') + memberId.substring(0, 4);
                memberList.appendChild(div);
            });
        }

        function addMessage(text, isOwn, sender) {
            const div = document.createElement('div');
            div.className = 'message' + (isOwn ? ' own' : '');
            
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = isOwn ? 'You' : 'User ' + sender;
            
            const content = document.createElement('div');
            content.textContent = typeof text === 'object' ? JSON.stringify(text) : text;
            
            div.appendChild(meta);
            div.appendChild(content);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.fontSize = '0.8em';
            div.style.color = '#666';
            div.style.margin = '10px 0';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const val = msgInput.value.trim();
            if (val && currentRoomName) {
                drone.publish({
                    room: currentRoomName,
                    message: val
                });
                msgInput.value = '';
            }
        };
    </script>
</body>
</html>
