<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOM.WS</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --subtext-color: #666666;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .background-logo {
            position: absolute;
            top: 50%;
            right: -10%; /* Adjusting to appear roughly 66% to the right */
            transform: translateY(-50%);
            width: 80vw;
            height: 80vh;
            background-image: url('icon.svg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.15;
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        a {
            font-size: 1.2rem;
            color: var(--subtext-color);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }

        a:hover {
            color: var(--text-color);
        }

        .logo-main {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="background-logo"></div>
    
    <div class="content">
        <img src="icon.svg" alt="ROOM.WS Logo" class="logo-main">
        <h1>ROOM.WS</h1>
        <a href="https://github.com/coreequip/room_ws" target="_blank">visit us on github</a>
    </div>
</body>
</html>
